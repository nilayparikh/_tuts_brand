<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1850" width="100%" height="100%" style="background-color: #07070A;">
    
    <!-- BRAND ASSET DEFINITIONS -->
    <defs>
        <!-- Load Fonts for precise rendering -->
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Outfit:wght@300;400;700&amp;display=swap');
            .tech-text { font-family: 'Share Tech Mono', 'Consolas', 'Courier New', monospace; }
            .sans-text { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
            
            /* Presentation Board Styles */
            .board-title { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 700; fill: #FFFFFF; letter-spacing: 1px; }
            .board-subtitle { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 400; fill: #8B949E; letter-spacing: 3px; text-transform: uppercase; }
            .card-label { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; fill: #4B5563; letter-spacing: 2px; text-transform: uppercase; }
        </style>

        <!-- Gradients based exactly on the provided image -->
        <!-- Outer Circle Neon Border Gradient -->
        <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00F5FF" />   <!-- Cyan Top Left -->
            <stop offset="35%" stop-color="#2932FF" />  <!-- Deep Blue Top Right -->
            <stop offset="70%" stop-color="#A838FF" />  <!-- Purple Bottom -->
            <stop offset="100%" stop-color="#FF9A44" /> <!-- Copper/Orange Bottom Right -->
        </linearGradient>

        <!-- Code Tag Gradients -->
        <linearGradient id="left-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00E1FF" />
            <stop offset="100%" stop-color="#FFB03A" /> <!-- Cyan to Orange/Yellow -->
        </linearGradient>
        
        <linearGradient id="slash-grad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#A838FF" />
            <stop offset="100%" stop-color="#4FACFE" /> <!-- Purple to Light Blue -->
        </linearGradient>

        <linearGradient id="right-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00FFB2" />
            <stop offset="100%" stop-color="#9D00FF" /> <!-- Green/Cyan to Purple -->
        </linearGradient>

        <!-- Subtle Glow Effects -->
        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
        </filter>


        <!-- ============================================== -->
        <!-- CORE ASSET 1: PERFECTLY CENTERED LOGO MARK     -->
        <!-- Used when the text is OUTSIDE the circle       -->
        <!-- ============================================== -->
        <g id="logo-mark">
            <circle cx="100" cy="100" r="96" fill="#0B0B0F" stroke="url(#border-grad)" stroke-width="4" />
            <g stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neon-glow)">
                <path d="M 65 65 L 35 100 L 65 135" stroke="url(#left-grad)" />
                <path d="M 112 63 L 82 137" stroke="url(#slash-grad)" />
                <path d="M 135 65 L 165 100 L 135 135" stroke="url(#right-grad)" />
            </g>
        </g>

        <!-- Perfectly Centered Monochrome Base -->
        <g id="logo-mark-white">
            <circle cx="100" cy="100" r="96" fill="none" stroke="#FFFFFF" stroke-width="4" />
            <g stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#FFFFFF">
                <path d="M 65 65 L 35 100 L 65 135" />
                <path d="M 112 63 L 82 137" />
                <path d="M 135 65 L 165 100 L 135 135" />
            </g>
        </g>


        <!-- ============================================== -->
        <!-- CORE ASSET 2: ORIGINAL FAVICON MARK (SHIFTED)  -->
        <!-- Shifted up slightly to accommodate embedded text -->
        <!-- ============================================== -->
        <g id="favicon-mark">
            <circle cx="100" cy="100" r="96" fill="#0B0B0F" stroke="url(#border-grad)" stroke-width="4" />
            <g stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neon-glow)">
                <path d="M 65 50 L 35 85 L 65 120" stroke="url(#left-grad)" />
                <path d="M 112 48 L 82 122" stroke="url(#slash-grad)" />
                <path d="M 135 50 L 165 85 L 135 120" stroke="url(#right-grad)" />
            </g>
        </g>

        <g id="favicon-full">
            <use href="#favicon-mark" />
            <!-- Font size reduced and shifted up slightly to avoid touching the circle bounds -->
            <text class="tech-text" x="100" y="162" fill="#F8FAFC" font-size="26" font-weight="bold" text-anchor="middle" letter-spacing="2">
                localm<tspan font-size="11" fill="#3B82F6" dy="-12" font-family="'Outfit', sans-serif">™</tspan>
            </text>
        </g>
    </defs>


    <!-- ========================================== -->
    <!-- PRESENTATION BOARD BACKGROUND & HEADER     -->
    <!-- ========================================== -->
    <path d="M 100 150 L 1300 150" stroke="#1E2336" stroke-width="2" />
    <text x="100" y="100" class="board-title">LocalM™ Tuts</text>
    <text x="100" y="130" class="board-subtitle">Complete Brand Asset Identity Guidelines</text>

    <!-- ========================================== -->
    <!-- SECTION 1: ORIGINAL FAVICON                -->
    <!-- ========================================== -->
    <rect x="100" y="200" width="360" height="420" rx="16" fill="#0D0F16" stroke="#1A1E2E" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="130" y="240" class="card-label">1. Original Favicon Base</text>
    
    <g transform="translate(180, 290)">
        <use href="#favicon-full" transform="scale(1)" />
    </g>


    <!-- ========================================== -->
    <!-- SECTION 2: PRIMARY HORIZONTAL LOGO         -->
    <!-- ========================================== -->
    <rect x="500" y="200" width="800" height="420" rx="16" fill="#0D0F16" stroke="#1A1E2E" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="530" y="240" class="card-label">2. Primary Logo (Horizontal Lockup)</text>
    
    <g transform="translate(560, 320)">
        <!-- Uses perfectly centered mark -->
        <use href="#logo-mark" transform="scale(0.8)" />
        
        <text x="190" y="105">
            <tspan class="tech-text" font-size="76" font-weight="bold" fill="#FFFFFF">localm</tspan>
            <tspan class="sans-text" font-size="32" font-weight="bold" fill="#4FACFE" dy="-35" dx="2">™</tspan>
            <tspan class="sans-text" font-size="76" font-weight="300" fill="#94A3B8" dy="35" dx="18">TUTS</tspan>
        </text>
    </g>


    <!-- ========================================== -->
    <!-- SECTION 3: SECONDARY VERTICAL LOGO         -->
    <!-- ========================================== -->
    <rect x="100" y="660" width="360" height="480" rx="16" fill="#0D0F16" stroke="#1A1E2E" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="130" y="700" class="card-label">3. Secondary Logo (Vertical Stacked)</text>

    <g transform="translate(150, 750)">
        <!-- Uses perfectly centered mark -->
        <use href="#logo-mark" transform="translate(30, 0) scale(1.0)" />
        
        <text class="tech-text" x="130" y="260" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            localm<tspan class="sans-text" font-size="20" fill="#4FACFE" dy="-20" dx="2">™</tspan>
        </text>
        <text class="sans-text" x="130" y="320" font-size="42" font-weight="300" fill="#94A3B8" text-anchor="middle" letter-spacing="4">
            TUTS
        </text>
    </g>


    <!-- ========================================== -->
    <!-- SECTION 4: ANIMATED BRAND MARK             -->
    <!-- ========================================== -->
    <rect x="500" y="660" width="800" height="480" rx="16" fill="#0D0F16" stroke="#1A1E2E" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="530" y="700" class="card-label">4. Animated Dynamic Lockup (SVG Web Ready)</text>

    <g transform="translate(560, 800)">
        <!-- Animated Rotating Background Circle -->
        <g transform="scale(0.85) translate(0, 10)">
            <circle cx="100" cy="100" r="96" fill="#0B0B0F" stroke="url(#border-grad)" stroke-width="4">
                <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite" />
            </circle>
            
            <!-- 
                Animated Drawing Code Symbols (Perfectly Centered)
                Fixed animation timings so the right `>` completes fully, and they all hold on screen together before looping.
            -->
            <g stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neon-glow)">
                
                <!-- Left < -->
                <path d="M 65 65 L 35 100 L 65 135" stroke="url(#left-grad)" stroke-dasharray="120" stroke-dashoffset="120">
                    <animate attributeName="stroke-dashoffset" values="120;0;0;120" keyTimes="0; 0.25; 0.8; 1" dur="4s" repeatCount="indefinite" />
                </path>
                
                <!-- Slash / -->
                <path d="M 112 63 L 82 137" stroke="url(#slash-grad)" stroke-dasharray="120" stroke-dashoffset="120">
                    <animate attributeName="stroke-dashoffset" values="120;0;0;120" keyTimes="0.1; 0.35; 0.8; 1" dur="4s" repeatCount="indefinite" />
                </path>
                
                <!-- Right > (Fixed fully complete and hold) -->
                <path d="M 135 65 L 165 100 L 135 135" stroke="url(#right-grad)" stroke-dasharray="120" stroke-dashoffset="120">
                    <animate attributeName="stroke-dashoffset" values="120;0;0;120" keyTimes="0.2; 0.45; 0.8; 1" dur="4s" repeatCount="indefinite" />
                </path>

            </g>
        </g>

        <!-- Typography -->
        <text x="190" y="105">
            <tspan class="tech-text" font-size="76" font-weight="bold" fill="#FFFFFF">localm</tspan>
            <tspan class="sans-text" font-size="32" font-weight="bold" fill="#4FACFE" dy="-35" dx="2">™</tspan>
            <tspan class="sans-text" font-size="76" font-weight="300" fill="#94A3B8" dy="35" dx="15">TUTS</tspan>
        </text>
    </g>


    <!-- ========================================== -->
    <!-- SECTION 5: MONOCHROME & UTILITY            -->
    <!-- ========================================== -->
    
    <!-- Flat Dark Version (For Light Backgrounds) -->
    <rect x="100" y="1180" width="580" height="340" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2" />
    <text x="130" y="1220" class="card-label" fill="#64748B">5. Monochrome Dark (For Light Backgrounds)</text>
    
    <g transform="translate(140, 1270) scale(0.8)">
        <!-- Centered Black mark -->
        <circle cx="100" cy="100" r="96" fill="none" stroke="#0F172A" stroke-width="5" />
        <g stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#0F172A">
            <path d="M 65 65 L 35 100 L 65 135" />
            <path d="M 112 63 L 82 137" />
            <path d="M 135 65 L 165 100 L 135 135" />
        </g>
        
        <text x="230" y="125">
            <tspan class="tech-text" font-size="85" font-weight="bold" fill="#0F172A">localm</tspan>
            <tspan class="sans-text" font-size="36" font-weight="bold" fill="#0F172A" dy="-40" dx="2">™</tspan>
            <tspan class="sans-text" font-size="85" font-weight="300" fill="#475569" dy="40" dx="20">TUTS</tspan>
        </text>
    </g>

    <!-- Flat Light Version (For Dark Backgrounds) -->
    <rect x="720" y="1180" width="580" height="340" rx="16" fill="#09090D" stroke="#1A1E2E" stroke-width="2" />
    <text x="750" y="1220" class="card-label">6. Monochrome Light (For Dark Backgrounds)</text>
    
    <g transform="translate(760, 1270) scale(0.8)">
        <!-- Centered White mark -->
        <use href="#logo-mark-white" />
        
        <text x="230" y="125">
            <tspan class="tech-text" font-size="85" font-weight="bold" fill="#FFFFFF">localm</tspan>
            <tspan class="sans-text" font-size="36" font-weight="bold" fill="#FFFFFF" dy="-40" dx="2">™</tspan>
            <tspan class="sans-text" font-size="85" font-weight="300" fill="#94A3B8" dy="40" dx="20">TUTS</tspan>
        </text>
    </g>

    <!-- ========================================== -->
    <!-- SECTION 6: BRAND COLOR PALETTE             -->
    <!-- ========================================== -->
    <text x="100" y="1600" class="board-subtitle">Brand Color System</text>
    
    <g transform="translate(100, 1640)">
        <circle cx="40" cy="40" r="40" fill="#00F5FF" />
        <text class="sans-text" x="40" y="110" font-size="14" fill="#94A3B8" text-anchor="middle">CYAN</text>
        <text class="sans-text" x="40" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">#00F5FF</text>
        
        <circle cx="160" cy="40" r="40" fill="#2932FF" />
        <text class="sans-text" x="160" y="110" font-size="14" fill="#94A3B8" text-anchor="middle">BLUE</text>
        <text class="sans-text" x="160" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">#2932FF</text>
        
        <circle cx="280" cy="40" r="40" fill="#A838FF" />
        <text class="sans-text" x="280" y="110" font-size="14" fill="#94A3B8" text-anchor="middle">PURPLE</text>
        <text class="sans-text" x="280" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">#A838FF</text>
        
        <circle cx="400" cy="40" r="40" fill="#00FFB2" />
        <text class="sans-text" x="400" y="110" font-size="14" fill="#94A3B8" text-anchor="middle">GREEN</text>
        <text class="sans-text" x="400" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">#00FFB2</text>
        
        <circle cx="520" cy="40" r="40" fill="#FFB03A" />
        <text class="sans-text" x="520" y="110" font-size="14" fill="#94A3B8" text-anchor="middle">GOLD</text>
        <text class="sans-text" x="520" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">#FFB03A</text>

        <circle cx="640" cy="40" r="40" fill="#0B0B0F" stroke="#2A2E3D" stroke-width="2"/>
        <text class="sans-text" x="640" y="110" font-size="14" fill="#94A3B8" text-anchor="middle">BASE</text>
        <text class="sans-text" x="640" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">#0B0B0F</text>
    </g>

    <g transform="translate(850, 1640)">
        <text class="sans-text" x="0" y="10" font-size="14" fill="#94A3B8" font-weight="bold" letter-spacing="2">PRIMARY FONT (LOGOTYPE)</text>
        <text class="tech-text" x="0" y="50" font-size="32" fill="#FFFFFF">Share Tech Mono</text>
        <text class="tech-text" x="0" y="80" font-size="18" fill="#64748B">Aa Bb Cc Dd Ee Ff 0123456789</text>

        <text class="sans-text" x="0" y="130" font-size="14" fill="#94A3B8" font-weight="bold" letter-spacing="2">SECONDARY FONT (TUTS)</text>
        <text class="sans-text" x="0" y="170" font-size="32" font-weight="300" fill="#FFFFFF">Outfit (Light)</text>
        <text class="sans-text" x="0" y="200" font-size="18" fill="#64748B">Aa Bb Cc Dd Ee Ff 0123456789</text>
    </g>

</svg>